<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noxa FA</title>

    <!-- Typographie premium (Inter + Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Thème global + reset -->
    <link rel="stylesheet" href="shell.css" />
    <!-- Modules d'interface (chacun dans son dossier dédié) -->
    <link rel="stylesheet" href="notify/notify.css" />
    <link rel="stylesheet" href="hud/hud.css" />
    <link rel="stylesheet" href="inventory/inventory.css" />
    <link rel="stylesheet" href="menus/menus.css" />
    <link rel="stylesheet" href="characters/characters.css" />
    <link rel="stylesheet" href="creator/creator.css" />
    <link rel="stylesheet" href="banking/banking.css" />
    <link rel="stylesheet" href="world/world.css" />
    <link rel="stylesheet" href="shop/shop.css" />
    <link rel="stylesheet" href="vehicles/vehicles.css" />
    <link rel="stylesheet" href="phone/phone.css" />
    <link rel="stylesheet" href="economy/economy.css" />
    <link rel="stylesheet" href="jobs/jobs.css" />
    <link rel="stylesheet" href="admin/admin.css" />
    <link rel="stylesheet" href="server-panel/server-panel.css" />
    <link rel="stylesheet" href="staff-panel/staff-panel.css" />
</head>
<body>
    <!-- Couche notifications (toasts) -->
    <div id="notify-stack" class="notify-stack"></div>

    <!-- HUD permanent -->
    <div id="hud" class="hud hidden"></div>

    <!-- Hotbar permanente (raccourcis 1-5) + grille d'inventaire -->
    <div id="inv-hotbar" class="inv-hotbar hidden"></div>
    <div id="inventory" class="hidden"></div>

    <!-- Flux de transactions économiques (toasts +/− sous le HUD argent) -->
    <div id="economy-feed"></div>

    <!-- Couche modale (menus contextuels, dialogues, confirmations) -->
    <div id="menu-layer" class="layer hidden"></div>

    <!-- Plein écran : sélection / création de personnage -->
    <div id="characters" class="fullscreen hidden"></div>

    <!-- Créateur de personnage (sidebar ; transparent ailleurs pour voir le ped) -->
    <div id="creator" class="hidden"></div>

    <!-- Plein écran : banque -->
    <div id="banking" class="fullscreen hidden"></div>

    <!-- Plein écran : boutique (épicerie) -->
    <div id="shop" class="fullscreen hidden"></div>

    <!-- Plein écran : concession / garage / fourrière -->
    <div id="vehicles" class="hidden"></div>

    <!-- Monde : prompt d'interaction + jauge carburant (informatif) -->
    <div id="world-prompt"></div>
    <div id="fuel-gauge" class="hidden"></div>

    <!-- Smartphone (couche dédiée, animation d'ouverture) -->
    <div id="phone"></div>

    <!-- Jobs actifs : MDT police / atelier méca / fouille (z-index 50) -->
    <div id="jobs" class="hidden"></div>

    <!-- Panneau d'administration (overlay staff, z-index 60) -->
    <div id="admin" class="hidden"></div>

    <!-- Panel gestion serveur (overlay superadmin, z-index 60) -->
    <div id="serverpanel" class="hidden"></div>

    <!-- Panel staff & anti-cheat (overlay staff, z-index 60) -->
    <div id="staffpanel" class="hidden"></div>

    <!-- Routeur NUI + helpers (chargé en premier) -->
    <script src="shell.js"></script>
    <!-- Modules d'interface -->
    <script src="notify/notify.js"></script>
    <script src="hud/hud.js"></script>
    <script src="inventory/inventory.js"></script>
    <script src="economy/economy.js"></script>
    <script src="menus/menus.js"></script>
    <script src="characters/characters.js"></script>
    <script src="creator/creator.js"></script>
    <script src="banking/banking.js"></script>
    <script src="world/world.js"></script>
    <script src="shop/shop.js"></script>
    <script src="vehicles/vehicles.js"></script>
    <script src="phone/phone.js"></script>
    <script src="jobs/jobs.js"></script>
    <script src="admin/admin.js"></script>
    <script src="server-panel/server-panel.js"></script>
    <script src="staff-panel/staff-panel.js"></script>
</body>
</html>
