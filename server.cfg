# =====================================================================
#  NOXA FA — server.cfg
#  Modifiez les lignes marquées ← ICI AVANT DE LANCER
# =====================================================================

# Endpoints (obligatoire — ne pas modifier sauf si port différent)
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Votre licence FiveM (https://keymaster.fivem.net)
sv_licenseKey "VOTRE_LICENCE_ICI"                        # ← ICI

# Nom de votre serveur (affiché dans la liste)
sv_hostname "Noxa FA | Serveur RP"                       # ← ICI

# Métadonnées projet (sinon avertissement console : sv_projectName/Desc manquants)
sets sv_projectName "Noxa FA"
sets sv_projectDesc "Serveur RP Noxa"

# Nombre max de joueurs
sv_maxclients 64

# Connexion base de données MySQL
# XAMPP/HeidiSQL par défaut : root sans mot de passe → rien à changer
# Si tu as un mot de passe MySQL : mysql://root:TONMOTDEPASSE@127.0.0.1/noxa_fa
set mysql_connection_string "mysql://root:@127.0.0.1/noxa_fa"

# Langue
sets locale "fr-FR"

# Sécurité
sv_scriptHookAllowed 0
sv_endpointPrivacy true

# OneSync (requis pour > 32 joueurs)
set onesync on

# =====================================================================
#  Ressources de base FiveM (incluses — ne pas toucher)
# =====================================================================
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure hardcap
ensure rconlog

# =====================================================================
#  Dépendances (incluses — ne pas toucher)
# =====================================================================
ensure oxmysql

# MenuV — bibliothèque de menus unifiée (TOUS les menus in-game).
# Charge AVANT noxa-fa : noxa-fa inclut @menuv/menuv.lua et en dépend.
ensure menuv

# =====================================================================
#  Noxa FA
# =====================================================================
ensure noxa-fa

# Couche de compatibilité ESX (shim vers noxa-fa).
# Permet à n'importe quel script ESX de tourner sans modification.
# Charge APRÈS noxa-fa (elle en dépend via exports).
ensure es_extended

# =====================================================================
#  Panels & interfaces NUI (designs Claude Design — visuels exacts)
# =====================================================================
ensure noxa_anticheat   # Panel anti-cheat tablette N&B (F6, superadmin/ACE)
ensure noxa_gestion     # Panel gestion serveur (F9, superadmin)
ensure noxa_phone       # Téléphone (F1)
ensure noxa_inventaire  # Inventaire (I)
ensure noxa_boutique    # Boutique (F7)

# Permissions panels superadmin (remplace XXXXXX par ton identifiant)
add_ace group.admin noxa.anticheat allow
add_ace group.admin noxa.gestion allow
# add_principal identifier.fivem:XXXXXX group.admin
