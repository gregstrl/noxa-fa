# =====================================================================
#  NOXA FA — server.cfg
#  Copiez ce fichier dans votre dossier server-data.
#  Modifiez les lignes marquées ← ICI AVANT DE LANCER
# =====================================================================

# Votre licence FiveM (https://keymaster.fivem.net)
sv_licenseKey "VOTRE_LICENCE_ICI"                        # ← ICI

# Nom de votre serveur (affiché dans la liste)
sv_hostname "Noxa FA | Serveur RP"                       # ← ICI

# Nombre max de joueurs
sv_maxclients 64

# Connexion base de données MySQL
set mysql_connection_string "mysql://user:password@127.0.0.1/noxa_fa"   # ← ICI

# Langue
sets locale "fr-FR"

# Sécurité
sv_scriptHookAllowed 0
sv_endpointPrivacy true

# OneSync (requis pour > 32 joueurs)
set onesync on

# =====================================================================
#  Ressources de base FiveM (ne pas toucher)
# =====================================================================
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure hardcap
ensure rconlog

# =====================================================================
#  Dépendances
# =====================================================================
ensure oxmysql

# =====================================================================
#  Noxa FA
# =====================================================================
ensure noxa-fa
