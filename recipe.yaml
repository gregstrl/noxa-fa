name: Noxa FA
author: Noxa FA
version: 1.0.0
description: Base FiveM RP premium — UI 100% custom, framework maison, oxmysql uniquement. Installation automatique via TXAdmin.

variables:
  serverName:
    label: Nom du serveur
    default: Noxa FA
  maxClients:
    label: Nombre max de joueurs
    default: 64

tasks:
  # 1. Ressources de base FiveM (chat, mapmanager, spawnmanager, etc.)
  - action: download_github
    src: citizenfx/cfx-server-data
    ref: master
    dest: ./
    subpath: resources

  # 2. oxmysql (seule dépendance externe)
  - action: download_github
    src: overextended/oxmysql
    ref: main
    dest: ./resources/[ox]/oxmysql

  # 3. Noxa FA (la base)
  - action: download_github
    src: gregstrl/noxa-fa
    ref: main
    dest: ./resources/[noxa]/noxa-fa

  # 4. Connexion base de données
  - action: connect_database

  # 5. Import du schéma SQL (fichier unique, idempotent)
  - action: query_database
    file: ./resources/[noxa]/noxa-fa/sql/install.sql

  # 6. Création du server.cfg
  - action: write_file
    file: ./server.cfg
    content: |
      # =====================================================================
      #  NOXA FA — server.cfg
      #  Généré automatiquement par TXAdmin. Modifiable librement ensuite.
      # =====================================================================

      # Licence FiveM (obligatoire)
      sv_licenseKey "{{svLicense}}"

      # Identité du serveur
      sv_hostname "{{serverName}}"
      sv_maxclients {{maxClients}}
      sets sv_projectName "Noxa FA"
      sets sv_projectDesc "Serveur RP premium — Noxa FA"

      # Langue
      sets locale "fr-FR"

      # Connexion base de données (oxmysql)
      set mysql_connection_string "{{dbConnectionString}}"

      # Sécurité
      sv_scriptHookAllowed 0
      sv_endpointPrivacy true

      # OneSync (obligatoire pour > 32 joueurs)
      set onesync on

      # =====================================================================
      #  Ressources de base FiveM
      # =====================================================================
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure hardcap
      ensure rconlog

      # =====================================================================
      #  Dépendances
      # =====================================================================
      ensure oxmysql

      # =====================================================================
      #  Noxa FA — la base
      # =====================================================================
      ensure noxa-fa

      # =====================================================================
      #  Admin TXAdmin
      # =====================================================================
      {{addPrincipalsMaster}}
